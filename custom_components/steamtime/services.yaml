start_session:
  fields:
    dishes:
      required: true
      example: [{ "dish_id": "broccoli" }, { "name": "Leftover stew", "minutes": 15 }]
      selector:
        object:

confirm_dish:
  fields:
    dish_id:
      required: true
      example: "d2"
      selector:
        text:

cancel_session:

add_dish:
  fields:
    name:
      required: true
      example: "Asparagus"
      selector:
        text:
    minutes:
      required: true
      example: 12
      selector:
        number:
          min: 1
          max: 600
          unit_of_measurement: minutes
    temperature:
      required: true
      example: 100
      selector:
        number:
          min: 1
          max: 250
          unit_of_measurement: "°C"
    category:
      required: true
      example: "vegetables"
      selector:
        select:
          options:
            - "vegetables"
            - "fish"
            - "meat"
            - "other"

update_dish:
  fields:

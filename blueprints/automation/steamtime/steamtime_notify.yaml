blueprint:
  name: SteamTime notifications
  description: >-
    Actionable-notification wiring for the SteamTime integration (design §7).
    Sends an "add this dish" alert with a Confirm added action button when a
    dish becomes ready, turns that button tap into a steamtime.confirm_dish
    call, sends a "dish is done" alert and a session-complete summary, and
    clears stale add-notifications if the session is cancelled.

    Import once, point it at your phone's notify service(s), and the whole
    confirm-from-lock-screen flow works with no further setup.
  domain: automation
  input:
    notify_targets:
      name: Notify service(s)
      description: >-
        One or more mobile_app notify services to send SteamTime alerts to,
        e.g. notify.mobile_app_iphone (find yours under Settings > Devices &
        Services > Mobile App > your device, or search "mobile_app" in
        Developer Tools > Actions). This must be the legacy per-device
        service, not a notify.* entity — only the per-device service
        supports actionable buttons, tags, and critical alerts.
      selector:
        text:
          multiple: true
    critical_add_alerts:
      name: Critical add alerts
      description: >-
        Send "add this dish" alerts as critical alerts: they play a sound and
        show even with Do Not Disturb on or the phone muted (iOS), and use
        high priority + the alarm channel (Android).
      default: false
      selector:
        boolean:
    chime_media_player:
      name: Chime media player (optional)
      description: Play a sound on this media_player when a dish is ready to add.
      default: []
      selector:
        entity:
          domain: media_player
          multiple: true
    chime_sound_url:
      name: Chime sound URL (optional)
      description: >-
        Media URL or media-source URI to play on the chime media player above.
        Only used if both this and the chime media player are set.
      default: ""
      selector:
        text:

mode: parallel
max_exceeded: silent

triggers:
  - trigger: event
    event_type: steamtime_add_dish
    id: add_dish
  - trigger: event
    event_type: steamtime_dish_done
    id: dish_done
  - trigger: event
    event_type: steamtime_session_completed
    id: session_completed
  - trigger: event
    event_type: steamtime_session_cancelled
    id: session_cancelled
  - trigger: event
    event_type: mobile_app_notification_action
    id: confirm_action

actions:
  - variables:
      # Blueprint inputs aren't automatically visible as template variables —
      # !input only works as a literal YAML substitution, not bare inside a
      # {{ }} expression. This makes them real variables for every template
      # below (in every choose branch, since variables set here last the
      # whole action run).
      critical_add_alerts: !input critical_add_alerts
      chime_media_player: !input chime_media_player
      chime_sound_url: !input chime_sound_url
  - choose:
      # A dish became ready_to_add: send the actionable "add it" alert.
      - conditions:
          - condition: trigger
            id: add_dish
        sequence:
          - repeat:
              for_each: !input notify_targets
              sequence:
                - action: "{{ repeat.item }}"
                  data:
                    title: Add to the oven
                    message: >-
                      Add {{ trigger.event.data.dish_name }} to the oven —
                      {{ trigger.event.data.temperature }} °C
                    data:
                      tag: "steamtime_{{ trigger.event.data.dish_id }}"
                      actions:
                        - action: >-
                            steamtime_confirm_{{ trigger.event.data.dish_id }}
                          title: Confirm added
                      push:
                        interruption-level: >-
                          {{ 'critical' if critical_add_alerts else 'active' }}
                        sound:
                          name: default
                          critical: "{{ 1 if critical_add_alerts else 0 }}"
                          volume: "{{ 1.0 if critical_add_alerts else 0.5 }}"
                      priority: "{{ 'high' if critical_add_alerts else 'normal' }}"
                      ttl: "{{ 0 if critical_add_alerts else 2419200 }}"
                      channel: >-
                        {{ 'alarm_stream' if critical_add_alerts else 'default' }}
          - if:
              - condition: template
                value_template: >-
                  {{ (chime_media_player | count > 0)
                     and (chime_sound_url | string | length > 0) }}
            then:
              - action: media_player.play_media
                target:
                  entity_id: !input chime_media_player
                data:
                  media_content_id: !input chime_sound_url
                  media_content_type: music

      # The user tapped "Confirm added" on a SteamTime add-notification.
      - conditions:
          - condition: trigger
            id: confirm_action
          - condition: template
            value_template: >-
              {{ trigger.event.data.action.startswith('steamtime_confirm_') }}
        sequence:
          - action: steamtime.confirm_dish
            data:
              dish_id: >-
                {{ trigger.event.data.action[len('steamtime_confirm_'):] }}

      # A dish finished cooking. Always time-sensitive/high-priority — unlike
      # the critical add-alerts toggle, this isn't optional: a finished dish
      # going cold or overcooking is worth prompt delivery by default,
      # without bypassing Do Not Disturb the way a critical alert would.
      - conditions:
          - condition: trigger
            id: dish_done
        sequence:
          - repeat:
              for_each: !input notify_targets
              sequence:
                - action: "{{ repeat.item }}"
                  data:
                    title: Done
                    message: "{{ trigger.event.data.dish_name }} is done"
                    data:
                      tag: "steamtime_{{ trigger.event.data.dish_id }}"
                      push:
                        interruption-level: time-sensitive
                      priority: high

      # Every dish is done.
      - conditions:
          - condition: trigger
            id: session_completed
        sequence:
          - repeat:
              for_each: !input notify_targets
              sequence:
                - action: "{{ repeat.item }}"
                  data:
                    title: SteamTime
                    message: Session complete — everything's ready!
                    data:
                      push:
                        interruption-level: time-sensitive
                      priority: high

      # Session cancelled: clear any stale add-notifications, then confirm.
      - conditions:
          - condition: trigger
            id: session_cancelled
        sequence:
          - repeat:
              for_each: "{{ trigger.event.data.dish_ids }}"
              sequence:
                # Capture the outer loop's item before the inner repeat
                # below shadows `repeat.item` with its own.
                - variables:
                    dish_id_to_clear: "{{ repeat.item }}"
                - repeat:
                    for_each: !input notify_targets
                    sequence:
                      - action: "{{ repeat.item }}"
                        data:
                          message: clear_notification
                          data:
                            tag: "steamtime_{{ dish_id_to_clear }}"
          - repeat:
              for_each: !input notify_targets
              sequence:
                - action: "{{ repeat.item }}"
                  data:
                    title: SteamTime
                    message: Session cancelled
